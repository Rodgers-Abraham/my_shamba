name: my_shamba
description: "A cross-platform farm management application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.1.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  get_it: ^8.0.3
  uuid: ^4.5.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  fl_chart: ^1.2.0
  http: ^1.6.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  tutorial_coach_mark: ^1.3.3
  flutter_svg: ^2.3.0
  flutter_dotenv: ^6.0.1
  table_calendar: ^3.2.0
  intl: ^0.20.2
  confetti: ^0.8.0
  timeline_tile: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1
  isar_generator: ^3.1.0+1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/kenya_political_units.csv
    - assets/crops_and_livestock.json
    - assets/crops_and_livestock_baselines.json
